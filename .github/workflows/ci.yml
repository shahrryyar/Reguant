name: Reguant CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout codebase
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.x'
        cache: true

    - name: Install dependencies
      run: go mod download

    - name: Verify code formatting
      run: |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Code formatting issues found:"
          gofmt -d .
          exit 1
        fi

    - name: Run unit tests
      run: go test -v ./...

    - name: Build Reguant Daemon (Linux AMD64)
      env:
        GOOS: linux
        GOARCH: amd64
      run: go build -v -o bin/reguant-linux-amd64 ./cmd/reguant/main.go

    - name: Build Reguant Daemon (Linux ARM64)
      env:
        GOOS: linux
        GOARCH: arm64
      run: go build -v -o bin/reguant-linux-arm64 ./cmd/reguant/main.go

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: reguant-binaries
        path: bin/
